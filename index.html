<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mathematical Love Heart</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}


body{

height:100vh;
overflow:hidden;

background:
radial-gradient(circle at center,#3a0b35,#020207);

color:white;

}



canvas{

position:absolute;
inset:0;

}



.container{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:92%;
max-width:500px;

text-align:center;

}



.heartBox{

width:300px;
height:300px;

position:relative;

margin:auto;

}



#imageHeart{


position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);


width:180px;
height:180px;


object-fit:cover;


clip-path:
polygon(
50% 95%,
0% 42%,
15% 15%,
40% 15%,
50% 35%,
60% 15%,
85% 15%,
100% 42%
);


opacity:0;


filter:
drop-shadow(0 0 35px #ff237b);


}



.title{

margin-top:10px;

font-size:28px;

font-weight:700;


}



.subtitle{

margin-top:8px;

opacity:.8;

}



button{


margin-top:22px;

padding:15px 45px;

border:none;

border-radius:50px;

background:
linear-gradient(45deg,#ff176b,#ff8ab8);

color:white;

font-size:17px;

box-shadow:
0 0 30px #ff176b;

}



.messagePanel{


display:none;

margin-top:20px;

padding:20px;

border-radius:25px;

background:
rgba(255,255,255,.12);

backdrop-filter:blur(20px);


}



textarea{

width:100%;

height:110px;

border-radius:15px;

padding:15px;

background:#050505;

color:white;

border:1px solid #777;

}


h2{

font-size:22px;

}


.math{

font-size:14px;

margin-top:15px;

color:#ffd0e5;

}



@media(max-width:600px){

.heartBox{

width:260px;
height:260px;

}

.title{

font-size:23px;

}


}

</style>

</head>



<body>



<canvas id="scene"></canvas>



<div class="container">



<div class="heartBox">


<img
id="imageHeart"
src="IMG-20260619-WA0011.jpg">


</div>



<div class="title">

A Mathematical Way To Say I Love You ❤️

</div>


<div class="math">

x = 16 sin³(t)
<br>

y = 13 cos(t)-5 cos(2t)-2 cos(3t)-cos(4t)

</div>



<div class="subtitle">

একটি হৃদয়ের গল্প যা গণিত দিয়েও প্রকাশ করা যায়

</div>



<button onclick="openMessage()">

Proceed

</button>




<div class="messagePanel" id="panel">


<h2>
Message Section
</h2>


<br>


<textarea id="msg">

My dad's message ❤️

</textarea>



<button onclick="sendMessage()">

Send To Messenger

</button>


</div>



</div>







<script>


// THREE JS HEART


const scene =
new THREE.Scene();



const camera =
new THREE.PerspectiveCamera(

75,

innerWidth/innerHeight,

0.1,

1000

);



camera.position.z=70;




const renderer =
new THREE.WebGLRenderer({

canvas:
document.getElementById("scene"),

alpha:true,

antialias:true

});



renderer.setSize(
innerWidth,
innerHeight
);




const group =
new THREE.Group();



scene.add(group);




const light =
new THREE.PointLight(
0xff4f9d,
10,
200
);


scene.add(light);





const material =
new THREE.MeshStandardMaterial({

color:0xff297b,

emissive:0xff0055,

emissiveIntensity:3,

metalness:.5,

roughness:.3

});





function heart(t){


return{


x:
16*Math.pow(Math.sin(t),3),


y:
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t)


}


}





let particles=[];



let total=900;



for(let i=0;i<total;i++){


let t =
Math.PI*2*(i/total);



let p =
heart(t);



let dot =
new THREE.Mesh(

new THREE.SphereGeometry(
0.17,
8,
8
),

material

);



dot.position.set(
0,
0,
0
);



group.add(dot);



particles.push({

obj:dot,

target:{

x:p.x/2,

y:p.y/2,

z:(Math.random()-.5)*8

}


});


}




// constructing animation

particles.forEach((p,i)=>{


gsap.to(

p.obj.position,

{

x:p.target.x,

y:p.target.y,

z:p.target.z,


duration:3,


delay:i*.002,


ease:"power2.out"

}


);


});





setTimeout(()=>{


gsap.to(

group.scale,

{

x:1.15,
y:1.15,
z:1.15,

duration:1,

repeat:1,

yoyo:true

}


);



gsap.to(

"#imageHeart",

{

opacity:1,

duration:2

}


);



},4500);







function animate(){


requestAnimationFrame(animate);



group.rotation.y +=0.006;



renderer.render(
scene,
camera
);



}


animate();







function openMessage(){

document
.getElementById("panel")
.style.display="block";


}





function sendMessage(){


let text =
encodeURIComponent(

document
.getElementById("msg")
.value

);



window.open(

"https://m.me/?text="+text,

"_blank"

);


}






window.onresize=()=>{


camera.aspect =
innerWidth/innerHeight;


camera.updateProjectionMatrix();


renderer.setSize(
innerWidth,
innerHeight
);


}



</script>



</body>
</html>
